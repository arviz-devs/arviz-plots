version: 2
updates:
- package-ecosystem: "github-actions"
  directory: "/"
  schedule:
    interval: "monthly"
  cooldown:
    default-days: 14
  groups:
    actions:
      patterns:
        - "*"
- package-ecosystem: "pre-commit"
  directory: "/"
  schedule:
    interval: "monthly"
  cooldown:
    default-days: 14
  groups:
    pre-commit:
      patterns:
        - "*"
